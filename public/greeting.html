<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Greeting — My Project</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .greeting-box {
      max-width: 480px;
      margin: 60px auto 80px;
      background: white;
      border-radius: 14px;
      padding: 40px 36px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      text-align: center;
      transition: background 0.3s;
    }

    body.dark .greeting-box {
      background: #161b22;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    .greeting-box input {
      width: 100%;
      padding: 12px 16px;
      font-size: 1rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s, background 0.3s, color 0.3s;
      background: #f9f9f9;
      color: #333;
    }

    .greeting-box input:focus {
      border-color: #0f3460;
    }

    body.dark .greeting-box input {
      background: #0d1117;
      border-color: #30363d;
      color: #c9d1d9;
    }

    body.dark .greeting-box input:focus {
      border-color: #1f6feb;
    }

    .greeting-box button {
      width: 100%;
      padding: 12px;
      background-color: #0f3460;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .greeting-box button:hover {
      background-color: #1a1a2e;
    }

    body.dark .greeting-box button {
      background-color: #1f6feb;
    }

    body.dark .greeting-box button:hover {
      background-color: #388bfd;
    }

    #result {
      margin-top: 24px;
      font-size: 1.4rem;
      font-weight: 600;
      color: #1a1a2e;
      min-height: 36px;
      transition: color 0.3s;
    }

    body.dark #result {
      color: #e6edf3;
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-logo">My Project</div>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/about">About</a></li>
      <li><a href="/contact">Contact</a></li>
      <li><a href="/greeting" class="active">Greeting</a></li>
      <li><button id="theme-toggle">Dark Mode</button></li>
    </ul>
  </nav>

  <section class="hero">
    <h1>Greeting</h1>
    <p>Type your name and get a personal greeting.</p>
  </section>

  <div class="greeting-box">
    <input type="text" id="name-input" placeholder="Enter your name..." />
    <button onclick="fetchGreeting()">Say Hello</button>
    <div id="result"></div>
  </div>

  <footer>
    <span>&copy; 2026 My Project</span>
    <span class="footer-divider">|</span>
    <a href="https://github.com/merrav" target="_blank" rel="noopener noreferrer">GitHub</a>
  </footer>

  <script>
    async function fetchGreeting() {
      const name = document.getElementById('name-input').value.trim();
      const url = name ? `/api/greeting?name=${encodeURIComponent(name)}` : '/api/greeting';
      const res = await fetch(url);
      const data = await res.json();
      document.getElementById('result').textContent = data.greeting;
    }

    document.getElementById('name-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') fetchGreeting();
    });

    const toggle = document.getElementById('theme-toggle');
    const body = document.body;
    if (localStorage.getItem('theme') === 'dark') {
      body.classList.add('dark');
      toggle.textContent = 'Light Mode';
    }
    toggle.addEventListener('click', () => {
      body.classList.toggle('dark');
      const isDark = body.classList.contains('dark');
      toggle.textContent = isDark ? 'Light Mode' : 'Dark Mode';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });
  </script>

</body>
</html>
