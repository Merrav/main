<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Process — My Project</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <div class="nav-logo">My Project</div>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/about">About</a></li>
      <li><a href="/contact">Contact</a></li>
      <li><a href="/greeting">Greeting</a></li>
      <li><button id="theme-toggle">Dark Mode</button></li>
    </ul>
  </nav>

  <section class="hero">
    <h1>Process</h1>
    <p>Send me an email for my Process list.</p>
  </section>

  <footer>
    <span>&copy; 2026 My Project</span>
    <span class="footer-divider">|</span>
    <a href="https://github.com/merrav" target="_blank" rel="noopener noreferrer">GitHub</a>
  </footer>

  <script>
    const toggle = document.getElementById('theme-toggle');
    const body = document.body;
    if (localStorage.getItem('theme') === 'dark') {
      body.classList.add('dark');
      toggle.textContent = 'Light Mode';
    }
    toggle.addEventListener('click', () => {
      body.classList.toggle('dark');
      const isDark = body.classList.contains('dark');
      toggle.textContent = isDark ? 'Light Mode' : 'Dark Mode';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });
  </script>

</body>
</html>
